name: Build and Release Grammarlot

# Triggers when you publish a release on GitHub, or when you click "Run workflow" manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      # This stops GitHub from canceling Windows/Mac if Linux fails
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Grammarlot-Windows
            ext: .exe
          - os: macos-latest
            name: Grammarlot-MacOS
            ext: ""
          - os: ubuntu-latest
            name: Grammarlot-Linux
            ext: ""
            
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup uv (Python Manager)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Build Script
        # We let uv handle everything. It will auto-download Python and build isolated environments.
        run: uv run build.py

      - name: Zip the Application (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path "Grammarlot.exe" -DestinationPath "..\${{ matrix.name }}.zip"

      - name: Zip the Application (Mac & Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          zip -r ../${{ matrix.name }}.zip "Grammarlot${{ matrix.ext }}"

      - name: Upload to Public GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ matrix.name }}.zip

      - name: Upload Artifacts for Private Testing
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip