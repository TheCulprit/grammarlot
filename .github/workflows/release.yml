name: Build and Release Grammarlot

# Triggers when you publish a release on GitHub, or when you click "Run workflow" manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Grammarlot-Windows
            ext: .exe
          - os: macos-latest
            name: Grammarlot-MacOS
            ext: .app
          - os: ubuntu-latest
            name: Grammarlot-Linux
            ext: ""
            
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup uv (Python Manager)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python & Libraries
        run: |
          uv python install 3.10
          uv pip install --system pillow pyinstaller

      - name: Run Build Script
        run: uv run build.py

      - name: Zip the Application
        run: |
          cd dist
          zip -r ../${{ matrix.name }}.zip "Grammarlot${{ matrix.ext }}"

      - name: Upload to Public GitHub Release
        uses: softprops/action-gh-release@v2
        # Only attach the files if this was triggered by a "v" tag (A Public Release)
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ matrix.name }}.zip

      - name: Upload Artifacts for Private Testing
        uses: actions/upload-artifact@v4
        # If triggered manually (No tag), just save them privately on the Actions page
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip